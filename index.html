<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPack Industries</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #111;
      color: white;
    }

    header img {
      height: 50px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      padding: 80px 30px;
      background: #f5f5f5;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      background: black;
      color: white;
      text-decoration: none;
      margin-right: 10px;
    }

    /* PRODUCTS */
    .products {
      padding: 50px;
      text-align: center;
    }

    .product-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .product-card {
      border: 1px solid #ddd;
      padding: 15px;
      width: 200px;
    }

    .product-card img {
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.jpeg" alt="Logo">

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Premium Disposable Packaging</h1>
  <p>پاکستان کی بہترین کوالٹی PET Cups اور Lids</p>

  <a href="#" class="btn">View Products</a>
  <a href="https://wa.me/923271770907" class="btn">WhatsApp</a>
</section>

<section class="products">
  <h2>Our Products</h2>

  <div class="product-grid">

    <div class="product-card">
      <img src="cup.jpeg.jpeg">
      <h3>Plastic Cup</h3>
    </div>

    <div class="product-card">
      <img src="dom-lid.jpeg.jpeg">
      <h3>Dome Lid</h3>
    </div>

    <div class="product-card">
      <img src="lid.jpg (3).jpeg">
      <h3>Flat Lid</h3>
    </div>

  </div>
</section>

</body>
</html>
