<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldPack Industries</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: black;
}

.logo img {
  height: 60px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("hero.jpeg.jpeg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.hero-content {
  position: relative;
  text-align: center;
}

/* PRODUCTS */
.products {
  padding: 60px;
  text-align: center;
}

.product-grid {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.product-card {
  background: #111;
  padding: 20px;
  width: 200px;
}

.product-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <!-- FIXED LOGO -->
  <div class="logo">
    <img src="./logo(1).jpeg">
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Premium Packaging</h1>
  </div>
</section>

<section class="products">
  <h2>Products</h2>

  <div class="product-grid">

    <!-- FIXED PATHS -->
    <div class="product-card">
      <img src="./cup.jpeg(1).jpeg">
      <h3>Cup</h3>
    </div>

    <div class="product-card">
      <img src="./dom-lid.jpeg(1).jpeg">
      <h3>Dome Lid</h3>
    </div>

    <div class="product-card">
      <img src="./lid.jpg (3)(1).jpeg">
      <h3>Flat Lid</h3>
    </div>

  </div>
</section>

</body>
</html>
