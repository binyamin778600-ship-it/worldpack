<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Packaging</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: url('hero.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* DARK OVERLAY */
.overlay {
  background: rgba(0,0,0,0.5);
  padding: 40px;
  border-radius: 10px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
}

/* BUTTONS */
.btn {
  display: inline-block;
  background: gold;
  color: black;
  padding: 12px 25px;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
}
</style>

</head>
<body>

<section class="hero">

  <div class="overlay">
    <h1>Premium Packaging</h1>
    <p>High quality PET Cups & Lids</p>

    <a href="#" class="btn">View Products</a>
    <a href="#" class="btn">WhatsApp</a>
  </div>

</section>

</body>
</html>
