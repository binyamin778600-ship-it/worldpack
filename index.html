<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPack Industries</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo(1).jpeg" alt="WorldPack Logo">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <p class="tag">✓ Free Delivery Across Pakistan</p>

    <h1>
      Premium <span>Packaging</span><br>
      Solutions
    </h1>

    <p class="desc">
      High quality PET Cups, Dome Lids and Flat Lids
      for cafes, restaurants and food chains.
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">View Products</a>
      <a href="#" class="btn secondary">WhatsApp Us</a>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Our Products</h2>

  <div class="product-grid">

    <div class="product-card">
      <img src="cup.jpeg(1).jpeg" alt="Plastic Cup">
      <h3>Plastic Cup</h3>
    </div>

    <div class="product-card">
      <img src="dom-lid.jpeg(1).jpeg" alt="Dome Lid">
      <h3>Dome Lid</h3>
    </div>

    <div class="product-card">
      <img src="lid.jpg (3)(1).jpeg" alt="Flat Lid">
      <h3>Flat Lid</h3>
    </div>

  </div>
</section>

</body>
</html>
