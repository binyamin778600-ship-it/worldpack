<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldPack</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* HEADER */
header {
  background: black;
  padding: 10px 20px;
}

.logo {
  height: 40px;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  background: url('images/hero.jpeg') center/cover no-repeat;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  z-index: 2;
  color: white;
  text-align: center;
  top: 40%;
}

.btn {
  padding: 10px 20px;
  background: gold;
  color: black;
  text-decoration: none;
  margin: 10px;
}

/* PRODUCTS */
.products {
  background: #111;
  padding: 40px;
  text-align: center;
}

.products img {
  width: 200px;
  margin: 10px;
}
</style>

</head>
<body>

<header>
  <img src="images/logo.jpeg" class="logo">
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Premium Packaging</h1>
    <p>High quality PET Cups & Lids</p>
    <a href="#" class="btn">View Products</a>
    <a href="#" class="btn">WhatsApp</a>
  </div>
</section>

<section class="products">
  <img src="images/cup.jpeg">
  <img src="images/dom-lid.jpeg">
  <img src="images/lid.jpeg">
</section>

</body>
</html>
